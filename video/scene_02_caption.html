<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 02 caption — Six weeks later</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..500&display=swap');

:root {
  --bg-cream:  #FAF8F1;
  --fg-ink:    #1F1F1F;
  --fg-soft:   #5A554E;
  --coral:     #C9593C;
  --serif:     'Brygada 1918', 'Iowan Old Style', Georgia, serif;

  --ease-in-out: cubic-bezier(0.65, 0.02, 0.18, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh; width: 100vw;
  background: var(--bg-cream);
  color: var(--fg-ink);
  font-family: var(--serif);
  overflow: hidden; cursor: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.stage {
  position: fixed; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8vw;
}

/* The line — large editorial italic, with caret blinking while typing.
   "why" is wrapped in <em.why> so we can sweep a coral underline under it. */
.caption {
  font-style: italic;
  font-weight: 400;
  font-size: 4.6vw;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: var(--fg-soft);
  text-align: center;
  max-width: 80vw;
  display: flex;
  align-items: baseline;
  justify-content: center;
  flex-wrap: wrap;
}

.caption .content em.why {
  color: var(--coral);
  font-style: italic;
  font-weight: 500;
}

.caption .caret {
  display: inline-block;
  width: 0.045em;
  height: 0.85em;
  background: var(--fg-soft);
  margin-left: 0.06em;
  opacity: 0;
}
.caption.typing .caret { animation: blink 0.85s steps(2) infinite; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
</style>
</head>
<body>

<div class="stage">
  <div class="caption" id="caption"><span class="content"></span><span class="caret"></span></div>
</div>

<script>
  const caption = document.getElementById('caption');
  const content = caption.querySelector('.content');

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── Timeline (1.5s pre-roll + ~5s line + ~2s hold) ──
  // 1.5s — typing starts ("Six weeks later, nobody can defend ")
  // ~3.5s — "why" types in (coral)
  // ~3.9s — period; brief pause
  // ~4.3s — coral underline sweeps under "why" (1.1s)
  // ~7.5s — end / cut
  // ─────────────────────────────────────────────

  async function run() {
    await wait(1500);
    caption.classList.add('typing');

    const PRE  = 'Six weeks later, nobody can defend ';
    const WHY  = 'why';
    const POST = '.';

    // Type the prefix
    for (let i = 0; i < PRE.length; i++) {
      content.textContent += PRE[i];
      await wait(34 + Math.random() * 22);
    }
    // Append "why" wrapped so we can target it for the coral underline
    const whyEl = document.createElement('em');
    whyEl.className = 'why';
    content.appendChild(whyEl);
    for (let i = 0; i < WHY.length; i++) {
      whyEl.textContent += WHY[i];
      await wait(56 + Math.random() * 26);
    }
    content.appendChild(document.createTextNode(POST));
  }

  run();

  document.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') location.reload();
    if (e.code === 'Space') { e.preventDefault(); location.href = 'scene_02b_system_tease.html'; }
  });
</script>

</body>
</html>
