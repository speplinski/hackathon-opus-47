<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 03 — Result · Before / Now</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..500&display=swap');

:root {
  --bg:      #FAF8F1;
  --fg:      #1F1F1F;
  --fg-soft: #5A554E;
  --coral:   #C9593C;
  --serif:   'Brygada 1918', 'Iowan Old Style', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh; width: 100vw;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--serif);
  overflow: hidden; cursor: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 12vw;
  gap: 2.4em;
}

.block { position: relative; }

/* Kicker — small italic label ("Before" / "Now"). */
.kicker {
  display: flex;
  align-items: baseline;
  font-style: italic;
  font-weight: 400;
  font-size: 2.4vw;
  line-height: 1;
  letter-spacing: -0.01em;
  color: var(--fg-soft);
  margin-bottom: 0.55em;
}
.kicker.now-coral { color: var(--coral); }

/* Lines — large editorial italic. */
.line {
  display: flex;
  align-items: baseline;
  font-style: italic;
  font-weight: 400;
  font-size: 4.4vw;
  line-height: 1.18;
  letter-spacing: -0.02em;
  color: var(--fg);
}

/* Shared typing caret — blinks while the element is .typing. */
.kicker .caret,
.line .caret {
  display: inline-block;
  width: 0.045em;
  height: 0.85em;
  margin-left: 0.06em;
  opacity: 0;
  background: currentColor;
}
.typing .caret { animation: blink 0.85s steps(2) infinite; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="block before">
    <div class="kicker"><span class="content"></span><span class="caret"></span></div>
    <div class="line"><span class="content"></span><span class="caret"></span></div>
    <div class="line"><span class="content"></span><span class="caret"></span></div>
  </div>

  <div class="block now">
    <div class="kicker now-coral"><span class="content"></span><span class="caret"></span></div>
    <div class="line"><span class="content"></span><span class="caret"></span></div>
    <div class="line"><span class="content"></span><span class="caret"></span></div>
  </div>
</div>

<script>
  // ── Typing helpers — same registers as scene_02_problem / scene_02_caption. ──
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function typeIn(el, text, charDelay = 35, jitter = 22) {
    const content = el.querySelector('.content');
    content.textContent = '';
    el.classList.add('typing');
    let i = 0;
    return new Promise(resolve => {
      function tick() {
        if (i < text.length) {
          content.textContent += text[i++];
          setTimeout(tick, charDelay + Math.random() * jitter);
        } else {
          resolve();
        }
      }
      tick();
    });
  }

  // ── Sequence ──
  // Block "Before" types in (kicker → line 1 → line 2),
  // pause, then Block "Now" types in (kicker in coral → line 1 → line 2).
  async function run() {
    await wait(1500);

    const before = document.querySelectorAll('.block.before .kicker, .block.before .line');
    const now    = document.querySelectorAll('.block.now .kicker, .block.now .line');

    const BEFORE_TEXTS = ['Before', 'A mockup in hours.', 'A defense in weeks.'];
    const NOW_TEXTS    = ['Now',    'Both in the same afternoon.', 'Reasoning preserved.'];

    // Type "Before" block sequentially. Last typed line keeps its caret;
    // earlier lines drop the .typing class once finished.
    for (let i = 0; i < before.length; i++) {
      await typeIn(before[i], BEFORE_TEXTS[i]);
      if (i < before.length - 1) before[i].classList.remove('typing');
      await wait(i === before.length - 1 ? 700 : 350);
    }
    before[before.length - 1].classList.remove('typing');

    // Pause between blocks (the "before / after" beat).
    await wait(900);

    // Type "Now" block sequentially.
    for (let i = 0; i < now.length; i++) {
      await typeIn(now[i], NOW_TEXTS[i]);
      if (i < now.length - 1) now[i].classList.remove('typing');
      await wait(i === now.length - 1 ? 700 : 350);
    }
    // Last line keeps its caret blinking until the scene cuts.
  }

  run();

  document.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') location.reload();
    if (e.code === 'Space') { e.preventDefault(); location.href = 'scene_03_traceable.html'; }
  });
</script>

</body>
</html>
