<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 08 — Validated direction (single column → converge on iter 03)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..500&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --bg-dark:    #0E0E0E;
  --phone-bg:   #1a1a1a;
  --screen-bg:  #0a0a0a;
  --paper:      #FFFDF6;
  --soft:       #BAB4A6;
  --muted:      #6B6560;
  --coral:      #C9593C;
  --green:      #5A8A6E;
  --amber:      #B88A2A;
  --serif:      'Brygada 1918', Georgia, serif;
  --mono:       'JetBrains Mono', monospace;
  --sans:       -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;

  --ease-in-out: cubic-bezier(0.65, 0.02, 0.18, 1);
  --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh; width: 100vw;
  background: var(--bg-dark);
  overflow: hidden; cursor: none;
  -webkit-font-smoothing: antialiased;
  font-family: var(--serif);
  color: var(--paper);
}

.stage {
  position: fixed; inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 2400px;
  perspective-origin: 50% 45%;
}

/* ── Single column of phones — same DNA as 05c.
   Phones don't move; their CONTENT cycles between 3 mockup variants. ── */
.filmstrip {
  display: flex;
  flex-direction: column;
  gap: 24px;
  transform-style: preserve-3d;
  transform-origin: 50% 50%;
  /* IN — same as 05c. */
  transform: translate(-560px, -180px) rotateX(50deg) rotateY(-10deg) rotateZ(-32deg) scale(1.35);
  will-change: transform;
}

.phone {
  width: 220px;
  aspect-ratio: 9 / 19.5;
  background: var(--phone-bg);
  border-radius: 26px;
  padding: 6px;
  box-shadow:
    inset 0 0 0 1.2px rgba(255, 255, 255, 0.08),
    0 30px 60px rgba(0, 0, 0, 0.55);
  flex-shrink: 0;
  transition: opacity 0.7s var(--ease-in-out);
}
.phone .screen {
  width: 100%; height: 100%;
  background: var(--screen-bg);
  border-radius: 20px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 5% 5%;
  font-family: var(--sans);
  color: white;
  position: relative;
}

/* ── Mockup chrome — same across all 3 variants. ── */
.status {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 8px;
  color: rgba(255, 255, 255, 0.6);
  font-weight: 500;
  padding: 0 5px;
  position: relative;
}
.status::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -75%);
  width: 30%; height: 11px;
  background: #000;
  border-radius: 12px;
}

.greeting {
  text-align: center;
  margin-top: 7%;
  margin-bottom: 4%;
}
.greeting .title {
  font-size: 12px;
  font-weight: 700;
  color: white;
}
.greeting .meta {
  font-size: 8px;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

.body { margin-top: auto; }
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: white;
}
.section-sub {
  font-size: 9px;
  color: rgba(255, 255, 255, 0.55);
  margin-top: 3px;
  margin-bottom: 8%;
  display: none;
}
.phone.v-0 .section-sub.s-0 { display: block; }
.phone.v-1 .section-sub.s-1 { display: block; }
.phone.v-2 .section-sub.s-2 { display: block; }

.options {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.opt-card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.10);
  border-radius: 9px;
  padding: 7px 9px;
}
.opt-card .name {
  font-size: 10px;
  font-weight: 600;
  color: white;
}
.opt-card .meta {
  font-size: 7px;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

/* Variant-driven option visibility:
   v-0 → only Get Super
   v-1 → Get Super + Come back tomorrow
   v-2 → Get Super + Watch an ad + Come back tomorrow */
.phone.v-0 .opt-watch,
.phone.v-0 .opt-tomorrow { display: none; }
.phone.v-1 .opt-watch    { display: none; }

/* ── Focus phase — only the picked phone stays bright. ── */
.stage.focused .phone:not(.picked) { opacity: 0.06; }

/* Picked gets a soft static green outline — the "validated" mark.
   No animation: this is a positive convergence, not an error. */
.stage.focused .phone.picked {
  box-shadow:
    inset 0 0 0 2.5px var(--green),
    0 0 32px rgba(90, 138, 110, 0.45),
    0 0 80px rgba(90, 138, 110, 0.22);
}

/* ── Reasons panel — anchored right, identical layout to 05c. ── */
.reasons {
  position: absolute;
  top: 50%;
  right: 6vw;
  transform: translateY(-50%);
  width: 42vw;
  display: flex;
  flex-direction: column;
  gap: 1.4rem;
  opacity: 0;
  transition: opacity 0.6s ease;
  z-index: 50;
}
.reasons.in { opacity: 1; }

.reason-header {
  font-family: var(--mono);
  font-size: 0.85rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 0.7rem;
  font-weight: 500;
}

.reason {
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.4s ease, transform 0.5s var(--ease-spring);
}
.reason.in { opacity: 1; transform: translateX(0); }

.reason .badge {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1.8px solid var(--soft);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  color: transparent;
  flex-shrink: 0;
  transition:
    border-color 0.35s ease,
    background-color 0.35s ease,
    color 0.35s ease,
    box-shadow 0.35s ease,
    transform 0.4s var(--ease-spring);
}
.reason.checked .badge {
  border-color: transparent;
  background: var(--green);
  color: var(--paper);
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
  transform: scale(1.04);
}

.reason .line {
  display: flex;
  align-items: baseline;
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 2.1vw;
  line-height: 1.3;
  letter-spacing: -0.01em;
  color: var(--paper);
}
.reason .caret {
  display: inline-block;
  width: 0.045em;
  height: 0.85em;
  background: var(--paper);
  margin-left: 0.06em;
  opacity: 0;
}
.reason .line.typing .caret { animation: blink 0.85s steps(2) infinite; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="filmstrip" id="strip">
    <!-- 50 phones in a single column — JS builds them. Picked = index 25. -->
  </div>

  <div class="reasons" id="reasons">
    <div class="reason-header">▸ direction validated</div>
    <div class="reason" data-text="Neutral copy">
      <div class="badge">✓</div>
      <div class="line"><span class="content"></span><span class="caret"></span></div>
    </div>
    <div class="reason" data-text="Streak protected by default">
      <div class="badge">✓</div>
      <div class="line"><span class="content"></span><span class="caret"></span></div>
    </div>
    <div class="reason" data-text="Three equal paths">
      <div class="badge">✓</div>
      <div class="line"><span class="content"></span><span class="caret"></span></div>
    </div>
    <div class="reason" data-text="Pricing transparent">
      <div class="badge">✓</div>
      <div class="line"><span class="content"></span><span class="caret"></span></div>
    </div>
    <div class="reason" data-text="No pre-selection">
      <div class="badge">✓</div>
      <div class="line"><span class="content"></span><span class="caret"></span></div>
    </div>
  </div>
</div>

<script>
  const strip = document.getElementById('strip');

  // ── Build 50 phones in a single column. Each phone gets one of 3 variant
  // classes initially, offset by index. Picked = index 25 (middle). ──
  const TOTAL = 50;
  const PICKED_IDX = 25;
  const VARIANT_COUNT = 3;
  const TARGET_VARIANT = 2;

  const PHONE_HTML = `
    <div class="screen">
      <div class="status"><span>9:43</span><span>·</span></div>
      <div class="greeting">
        <div class="title">Nice work!</div>
        <div class="meta">+10 XP · 47-day streak</div>
      </div>
      <div class="body">
        <div class="section-title">You're out of energy</div>
        <div class="section-sub s-0">Continue with Super.</div>
        <div class="section-sub s-1">Pick what's next.</div>
        <div class="section-sub s-2">We saved your spot. Pick what's next.</div>
        <div class="options">
          <div class="opt-card opt-super">
            <div class="name">Get Super</div>
            <div class="meta">$6.99/month · cancel anytime</div>
          </div>
          <div class="opt-card opt-watch">
            <div class="name">Watch an ad</div>
            <div class="meta">Refills your energy</div>
          </div>
          <div class="opt-card opt-tomorrow">
            <div class="name">Come back tomorrow</div>
            <div class="meta">Refills overnight</div>
          </div>
        </div>
      </div>
    </div>
  `;

  const phones = [];
  for (let i = 0; i < TOTAL; i++) {
    const phone = document.createElement('div');
    phone.className = 'phone v-' + (i % VARIANT_COUNT) + (i === PICKED_IDX ? ' picked' : '');
    phone.innerHTML = PHONE_HTML;
    strip.appendChild(phone);
    phones.push(phone);
  }

  function setVariant(phone, vIdx) {
    phone.classList.remove('v-0', 'v-1', 'v-2');
    phone.classList.add('v-' + vIdx);
  }

  // ── Timeline (same wall-clock targets as 05c) ──
  //  0:00  — start: cycle phones (v-0 → v-1 → v-2 → v-0 …)
  //  2:00  — STOP cycle + .focused (others dim)
  //  2:75  — panel header on (after focus settles)
  //  3:00  — Reason 1 (Neutral copy)
  //  4:00  — Reason 2 (Streak protected by default)
  //  5:00  — Reason 3 (Three equal paths)
  //  6:00  — Reason 4 (Pricing transparent)
  //  7:00  — Reason 5 (No pre-selection)
  //  8:00  — all done
  // ─────────────────────────────────────────────
  const CYCLE_INTERVAL = 80;
  const STOP_AT       = 2000;
  const ITEM_TIMES    = [3000, 4000, 5000, 6000, 7000];

  let step = 0;
  const cycleId = setInterval(() => {
    step++;
    phones.forEach((phone, i) => {
      setVariant(phone, (i + step) % VARIANT_COUNT);
    });
  }, CYCLE_INTERVAL);

  // Hard stop at 2s — snap so the picked phone lands on v-2 (validated).
  // Sequence is preserved — no manual override on picked.
  setTimeout(() => {
    clearInterval(cycleId);
    const target = step + ((TARGET_VARIANT - ((PICKED_IDX + step) % VARIANT_COUNT) + VARIANT_COUNT) % VARIANT_COUNT);
    phones.forEach((phone, i) => {
      setVariant(phone, (i + target) % VARIANT_COUNT);
    });
    document.getElementById('stage').classList.add('focused');
    setTimeout(() => document.getElementById('reasons').classList.add('in'), 750);
  }, STOP_AT);

  // ── Reveal reasons one by one — empty circle → text types → checked. ──
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function typeLine(lineEl, text, charDelay = 16, jitter = 12) {
    const content = lineEl.querySelector('.content');
    content.textContent = '';
    lineEl.classList.add('typing');
    let i = 0;
    return new Promise(resolve => {
      function tick() {
        if (i < text.length) {
          content.textContent += text[i++];
          setTimeout(tick, charDelay + Math.random() * jitter);
        } else {
          resolve();
        }
      }
      tick();
    });
  }

  async function revealItem(item) {
    item.classList.add('in');
    await wait(60);
    const line = item.querySelector('.line');
    await typeLine(line, item.dataset.text);
    line.classList.remove('typing');
    await wait(80);
    item.classList.add('checked');
  }

  const items = Array.from(document.querySelectorAll('.reason'));
  ITEM_TIMES.forEach((t, i) => {
    setTimeout(() => revealItem(items[i]), t);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') location.reload();
    if (e.code === 'Space') { e.preventDefault(); location.href = 'scene_08b_cost.html'; }
  });
</script>

</body>
</html>
