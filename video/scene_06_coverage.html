<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene 06 — Coverage (Opus 4.7 → 7 defects)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..500&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --bg:      #FAF8F1;
  --fg:      #1F1F1F;
  --fg-soft: #5A554E;
  --coral:   #C9593C;
  --serif:   'Brygada 1918', 'Iowan Old Style', Georgia, serif;
  --mono:    'JetBrains Mono', 'SF Mono', Menlo, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh; width: 100vw;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--serif);
  overflow: hidden; cursor: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.stage {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 12vw;
  gap: 2.0em;
}

/* Intro line — small italic kicker. */
.intro {
  display: flex;
  align-items: baseline;
  font-style: italic;
  font-weight: 400;
  font-size: 2.2vw;
  line-height: 1.3;
  color: var(--fg-soft);
  letter-spacing: -0.005em;
}

/* Hero row — model → count (with coral 7). Use baseline alignment for the
   italic serif tokens; the arrow gets its own line-height so it sits on
   the same optical line. */
.hero {
  display: flex;
  align-items: baseline;
  gap: 1.4vw;
  font-style: italic;
  font-weight: 400;
  font-size: 4.6vw;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--fg);
  flex-wrap: wrap;
}
.hero .model,
.hero .count {
  display: flex;
  align-items: baseline;
}
.hero .arrow {
  font-family: var(--mono);
  font-style: normal;
  font-weight: 400;
  font-size: 3.0vw;
  line-height: 1;
  color: var(--fg-soft);
  /* Sit the arrow at the italic serif x-height — between baseline and
     cap height, in line with the letters. */
  align-self: center;
  transform: translateY(-0.1em);
}
.hero .count em.k {
  font-style: italic;
  font-weight: 500;
  color: var(--coral);
}

/* Shared caret — blinks while .typing. */
.typing-block {
  display: inline-flex;
  align-items: baseline;
}
.intro .caret,
.hero .caret {
  display: inline-block;
  width: 0.045em;
  height: 0.85em;
  margin-left: 0.06em;
  opacity: 0;
  background: currentColor;
}
.typing .caret { animation: blink 0.85s steps(2) infinite; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

/* Hero parts only become visible once they have content typed. */
.hero .arrow,
.hero .count {
  opacity: 0;
  transition: opacity 0.4s ease;
}
.hero .arrow.shown,
.hero .count.shown { opacity: 1; }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="intro" id="intro">
    <span class="content"></span><span class="caret"></span>
  </div>

  <div class="hero">
    <span class="model" id="model"><span class="content"></span><span class="caret"></span></span>
    <span class="arrow" id="arrow">→</span>
    <span class="count" id="count"><span class="content"></span><span class="caret"></span></span>
  </div>
</div>

<script>
  const intro = document.getElementById('intro');
  const model = document.getElementById('model');
  const arrow = document.getElementById('arrow');
  const count = document.getElementById('count');

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function typePlain(el, text, charDelay = 18, jitter = 12) {
    const content = el.querySelector('.content');
    content.textContent = '';
    el.classList.add('typing');
    let i = 0;
    return new Promise(resolve => {
      function tick() {
        if (i < text.length) {
          content.textContent += text[i++];
          setTimeout(tick, charDelay + Math.random() * jitter);
        } else {
          resolve();
        }
      }
      tick();
    });
  }

  // Type a span sequence with optional coral fragments wrapped in <em.k>.
  async function typeSegments(el, segments, charDelay = 18, jitter = 12) {
    const content = el.querySelector('.content');
    content.textContent = '';
    el.classList.add('typing');
    for (const seg of segments) {
      if (seg.coral) {
        const em = document.createElement('em');
        em.className = 'k';
        content.appendChild(em);
        for (let i = 0; i < seg.coral.length; i++) {
          em.textContent += seg.coral[i];
          await wait(charDelay + Math.random() * jitter + 12);
        }
      } else {
        for (let i = 0; i < seg.plain.length; i++) {
          content.appendChild(document.createTextNode(seg.plain[i]));
          await wait(charDelay + Math.random() * jitter);
        }
      }
    }
  }

  // ── Sequence (faster typing) ──
  // 1.0s — intro types: "On the same cluster, same audit pipeline:"
  // ~1.9s — model types: "Opus 4.7"
  // ~2.2s — arrow appears
  // ~2.4s — count types: "7 defects named." (with "7" coral)
  // ~3.4s+ — hold; cut at ~4.5s
  async function run() {
    await wait(1000);
    await typePlain(intro, 'On the same cluster, same audit pipeline:');
    intro.classList.remove('typing');

    await wait(280);
    await typePlain(model, 'Opus 4.7');
    model.classList.remove('typing');

    await wait(120);
    arrow.classList.add('shown');

    await wait(160);
    count.classList.add('shown');
    await typeSegments(count, [
      { coral: '7' },
      { plain: ' defects named.' },
    ]);
    // count keeps caret blinking until cut.
  }

  run();

  document.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') location.reload();
    if (e.code === 'Space') { e.preventDefault(); location.href = 'scene_07_climax.html'; }
  });
</script>

</body>
</html>
