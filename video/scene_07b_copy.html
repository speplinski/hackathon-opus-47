<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 07b — Same product. Different price.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..500&display=swap');

:root {
  --bg:        #C9593C;
  --fg-cream:  #FAF8F1;
  --punch:     #2A0A0E;
  --serif:     'Brygada 1918', 'Iowan Old Style', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh; width: 100vw;
  background: var(--bg);
  color: var(--fg-cream);
  font-family: var(--serif);
  overflow: hidden; cursor: none;
  -webkit-font-smoothing: antialiased;
}

.stage {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 8vw;
  gap: 0.4em;
}

.line {
  display: flex;
  align-items: baseline;
  justify-content: center;
  font-style: italic;
  font-weight: 400;
  font-size: 6.6vw;
  line-height: 1.18;
  letter-spacing: -0.02em;
  color: var(--fg-cream);
  text-align: center;
}
.line.punch { color: var(--punch); font-weight: 500; }

.line .caret {
  display: none;
  width: 0.045em;
  height: 0.85em;
  background: currentColor;
  margin-left: 0.06em;
}
.typing .caret {
  display: inline-block;
  animation: blink 0.85s steps(2) infinite;
}
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
</style>
</head>
<body>

<div class="stage">
  <div class="line"      id="l1"><span class="content"></span><span class="caret"></span></div>
  <div class="line punch" id="l2"><span class="content"></span><span class="caret"></span></div>
</div>

<script>
  const l1 = document.getElementById('l1');
  const l2 = document.getElementById('l2');

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function typeLine(el, text, charDelay = 26, jitter = 16) {
    const content = el.querySelector('.content');
    content.textContent = '';
    el.classList.add('typing');
    let i = 0;
    return new Promise(resolve => {
      function tick() {
        if (i < text.length) {
          content.textContent += text[i++];
          setTimeout(tick, charDelay + Math.random() * jitter);
        } else {
          resolve();
        }
      }
      tick();
    });
  }

  // typeOut — same DNA as scene_01: characters delete one at a time
  // until the line is empty, then caret stops blinking.
  function typeOut(el, charDelay = 22) {
    const content = el.querySelector('.content');
    el.classList.add('typing');
    return new Promise(resolve => {
      function tick() {
        if (content.textContent.length > 0) {
          content.textContent = content.textContent.slice(0, -1);
          setTimeout(tick, charDelay);
        } else {
          el.classList.remove('typing');
          resolve();
        }
      }
      tick();
    });
  }

  // ── First VO beat: type in, hold ~4s total, then untype + switch.
  //    Second line is faster so the gap doesn't drag. ──
  async function run() {
    await wait(500);
    await typeLine(l1, 'Same product.', 50, 20);     // ~0.8s
    l1.classList.remove('typing');

    await wait(500);
    await typeLine(l2, 'Different price.', 50, 20);  // ~0.8s

    await wait(1500);
    await typeOut(l2);
    await typeOut(l1);
  }

  run();

  document.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') location.reload();
    if (e.code === 'Space') { e.preventDefault(); location.href = 'scene_07c_rubric.html'; }
  });
</script>

</body>
</html>
