<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene 03 traceable — Every claim traceable</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Brygada+1918:ital,wght@0,400..700;1,400..500&display=swap');

:root {
  --bg-cream:  #FAF8F1;
  --fg-ink:    #1F1F1F;
  --fg-soft:   #5A554E;
  --coral:     #C9593C;
  --serif:     'Brygada 1918', 'Iowan Old Style', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100vh; width: 100vw;
  background: var(--bg-cream);
  color: var(--fg-ink);
  font-family: var(--serif);
  overflow: hidden; cursor: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.stage {
  position: fixed; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8vw;
}

.caption {
  font-style: italic;
  font-weight: 400;
  font-size: 4.0vw;
  line-height: 1.3;
  letter-spacing: -0.02em;
  color: var(--fg-soft);
  text-align: center;
  max-width: 80vw;
  display: flex;
  align-items: baseline;
  justify-content: center;
  flex-wrap: wrap;
}

.caption .content em.key {
  color: var(--coral);
  font-style: italic;
  font-weight: 500;
}

.caption .caret {
  display: inline-block;
  width: 0.045em;
  height: 0.85em;
  background: var(--fg-soft);
  margin-left: 0.06em;
  opacity: 0;
}
.caption.typing .caret { animation: blink 0.85s steps(2) infinite; }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
</style>
</head>
<body>

<div class="stage">
  <div class="caption" id="caption"><span class="content"></span><span class="caret"></span></div>
</div>

<script>
  const caption = document.getElementById('caption');
  const content = caption.querySelector('.content');

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Typed line: "Every claim traceable to the user sentence that caused it."
  // "traceable" lights up in coral as the meaningful word.
  async function run() {
    await wait(1500);
    caption.classList.add('typing');

    const PRE = 'Every claim ';
    const KEY = 'traceable';
    const POST = ' to the user sentence that caused it.';

    for (let i = 0; i < PRE.length; i++) {
      content.textContent += PRE[i];
      await wait(34 + Math.random() * 22);
    }
    const keyEl = document.createElement('em');
    keyEl.className = 'key';
    content.appendChild(keyEl);
    for (let i = 0; i < KEY.length; i++) {
      keyEl.textContent += KEY[i];
      await wait(56 + Math.random() * 26);
    }
    for (let i = 0; i < POST.length; i++) {
      content.appendChild(document.createTextNode(POST[i]));
      await wait(34 + Math.random() * 22);
    }
  }

  run();

  document.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') location.reload();
    if (e.code === 'Space') { e.preventDefault(); location.href = 'scene_04_pipeline.html'; }
  });
</script>

</body>
</html>
