name: Build and deploy demo to GitHub Pages

# No ANTHROPIC_API_KEY is referenced anywhere in this workflow.
# The pipeline runs on the author's machine; this workflow only uploads
# the pre-built static demo bundle to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # ────────────────────────────────────────────────────────────────────────
  # Publish demo — vanilla static HTML/CSS/JS, no build step
  #
  # The demo is intentionally plain static files in demo/public/
  # (index.html, styles.css, app.js, data.json, screenshots/). No
  # bundler, no Node, no build pipeline. data.json is committed to the
  # repo (built locally via ``uv run python scripts/build_demo_data.py``
  # after a pipeline re-run). This job uploads demo/public/ verbatim
  # as the Pages artifact.
  # ────────────────────────────────────────────────────────────────────────
  build-demo:
    name: Upload static demo bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify demo/public exists
        run: |
          if [ ! -f demo/public/index.html ]; then
            echo "::error::demo/public/index.html missing — nothing to publish"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/public

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-demo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
